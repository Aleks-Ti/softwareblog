<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Admin</title></head>
<body>
    <h1>Dashboard</h1>
    <p><a href="/admin/posts/new">New post</a> | <a href="/admin/comments">Comments ({{ pending_count }} pending)</a></p>

    <h2>Posts</h2>
    <table>
        <thead><tr><th>Title</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
        {% for post in posts %}
        <tr>
            <td>{{ post.title }}</td>
            <td>{{ post.status }}</td>
            <td>
                <a href="/admin/posts/{{ post.id }}/edit">Edit</a>
                <form method="POST" action="/admin/posts/{{ post.id }}/publish" style="display:inline">
                    <button type="submit">Publish</button>
                </form>
                <form method="POST" action="/admin/posts/{{ post.id }}/delete" style="display:inline">
                    <button type="submit" onclick="return confirm('Delete?')">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <form method="POST" action="/admin/logout">
        <button type="submit">Logout</button>
    </form>
</body>
</html>
