<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}admin{% endblock %} :: blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <header>
        <a href="/admin" class="site-title">admin</a>
        <nav>
            <a href="/admin">posts</a>
            <a href="/admin/comments">comments</a>
            <a href="/" target="_blank">view blog</a>
            <form method="POST" action="/admin/logout" style="display:inline">
                <button type="submit" class="nav-logout">logout</button>
            </form>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <span>admin panel</span>
    </footer>
</body>
</html>
