<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin :: login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body { justify-content: center; align-items: center; }
        .login-box {
            width: 100%;
            max-width: 360px;
            padding: 2rem;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .login-title {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .login-title span { color: var(--accent); }
        .error {
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            color: var(--red);
            margin-bottom: 1rem;
            padding: 0.5rem 0.75rem;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: var(--radius);
        }
        .error::before { content: "✗ "; }
    </style>
</head>
<body>
    <div class="login-box">
        <p class="login-title">$ ssh <span>admin@blog</span></p>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label for="password">password</label>
                <input type="password" id="password" name="password"
                       autofocus autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem">
                login
            </button>
        </form>
    </div>
</body>
</html>
