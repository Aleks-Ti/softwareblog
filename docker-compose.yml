services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: softwareblog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_secret
    ports:
      - "5466:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
